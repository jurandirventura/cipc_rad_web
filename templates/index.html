<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>CIPC Viewer</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="/static/style.css"/>

</head>

<body>

<div id="sidebar">

<h2>CIPC Viewer</h2>

Produto<br>
<select id="produto"></select><br><br>

Ano<br>
<select id="ano"></select><br><br>

Data<br>
<select id="data"></select><br><br>

<button onclick="addLayer()">Adicionar camada</button>

<button onclick="toggleTimeline()">☰</button>

<hr>

<h3>Camadas</h3>

<hr>

<div id="layersPanel"></div>


<div id="pixelValues"
style="
position:absolute;
bottom:15px;
right:15px;
background:rgba(255,255,255,0.9);
padding:10px;
font-size:12px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.3);
z-index:1000;">
Pixel values
</div>

<h3>Legendas</h3>

<div id="legendPanel"></div>

</div>

<div id="map"></div>

<!-- Área para Timeline e gráfico-->

<div id="timelinePanel">

<h3>Timeline</h3>

Data inicial<br>
<input type="date" id="startDate"><br><br>

Data final<br>
<input type="date" id="endDate"><br><br>

<button onclick="loadTimeline()">Carregar Timeline</button>
<button onclick="playTimeline()">▶ Play</button>
<button onclick="stopTimeline()">■ Stop</button>

<br><br>

Velocidade<br>
<input id="speedSlider" type="range" min="100" max="2000" step="100" value="500">
<span id="speedLabel">500 ms</span>

<br><br>

<input type="range"
id="timeSlider"
min="0"
max="0"
step="1"
value="0"
style="width:100%">

<br>

<span id="timeLabel"></span>

<br><br>

<button onclick="downloadCSV()">Download CSV</button>

</div>

<!-- Área de gráfico-->
<div id="chartPanel" style="
position:absolute;
bottom:10px;
left:10px;
width:420px;
height:220px;
background:white;
border:1px solid gray;
padding:5px;
z-index:1000;
">

<b>Pixel time series</b>

<canvas id="pixelChart"></canvas>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/georaster"></script>

<script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

<script src="/static/js/viewer.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="chart" width="400" height="200"></canvas>


</body>

</html>
